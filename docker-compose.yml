services:
  autofilemover:
    # Published image from GitHub Container Registry (GHCR).
    # Tags: latest (= main branch), main, vX.Y.Z (releases), sha-<commit>.
    image: ghcr.io/daknoblo/autofilemover:latest
    container_name: autofilemover
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AFM_HTTP_ADDR: ":8080"
      AFM_DB_PATH: "/data/autofilemover.db"
      AFM_MEDIA_ROOT: "/dataroot"
      # How long a download must be unchanged before it is processed.
      AFM_STABILITY_WINDOW: "30s"
      # Fallback periodic scan interval (the watcher reacts in real time).
      AFM_SCAN_INTERVAL: "5m"
      AFM_LOG_LEVEL: "info"
    # Match your media owner so moved files keep correct permissions.
    # user: "1000:1000"
    volumes:
      # Persistent app database.
      - ./data:/data
      # Your media root containing Downloads + Jellyfin libraries.
      # It is mounted as /dataroot, which then becomes the root in the web UI.
      - /data/mounts/storage-box/media/:/dataroot
